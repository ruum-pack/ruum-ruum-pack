<!--
  Ícono de marca de Ruum Ruum — el "anillo de control". Aquí el arco es
  signal (#ff4d1d) porque en app-conductor el anillo representa el checklist
  de evidencia y la siguiente acción que debe tomar el conductor.
  Next.js App Router detecta app/icon.svg automáticamente como favicon.
-->
<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <circle cx="32" cy="32" r="28" fill="#14171c" />
  <circle cx="32" cy="32" r="22" fill="none" stroke="#2a313d" stroke-width="6" />
  <circle
    cx="32"
    cy="32"
    r="22"
    fill="none"
    stroke="#ff4d1d"
    stroke-width="6"
    stroke-linecap="round"
    stroke-dasharray="104 138"
    transform="rotate(-90 32 32)"
  />
</svg>
