<!--
  Ícono de marca de Ruum Ruum — el "anillo de control" (ver propuesta de
  identidad, 2026-06-29). Mismo símbolo en las tres apps, leído distinto por
  color de arco: aquí el arco es route (#1758f2) porque en app-usuario el
  anillo representa el avance del Pasaporte Digital que el cliente sigue.
  Next.js App Router detecta app/icon.svg automáticamente como favicon.
-->
<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <circle cx="32" cy="32" r="28" fill="#14171c" />
  <circle cx="32" cy="32" r="22" fill="none" stroke="#2a313d" stroke-width="6" />
  <circle
    cx="32"
    cy="32"
    r="22"
    fill="none"
    stroke="#1758f2"
    stroke-width="6"
    stroke-linecap="round"
    stroke-dasharray="78 138"
    transform="rotate(-90 32 32)"
  />
</svg>
