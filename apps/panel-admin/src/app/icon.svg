<!--
  Ícono de marca de Ruum Ruum — el "anillo de control". Aquí el arco es
  control (#16b378) porque en panel-admin el anillo representa la salud
  agregada de la flota activa (Torre de Control, PRD §3).
  Next.js App Router detecta app/icon.svg automáticamente como favicon.
-->
<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <circle cx="32" cy="32" r="28" fill="#14171c" />
  <circle cx="32" cy="32" r="22" fill="none" stroke="#2a313d" stroke-width="6" />
  <circle
    cx="32"
    cy="32"
    r="22"
    fill="none"
    stroke="#16b378"
    stroke-width="6"
    stroke-linecap="round"
    stroke-dasharray="128 138"
    transform="rotate(-90 32 32)"
  />
</svg>
