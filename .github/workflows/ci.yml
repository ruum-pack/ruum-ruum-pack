name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - release/**

jobs:
  workspace:
    name: Workspace checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://ci.supabase.test
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
      NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN: pk.ci
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_ci
      NEXT_PUBLIC_PANEL_ADMIN_DEMO: "true"
      NEXT_PUBLIC_APP_VERSION: ci
      NEXT_PUBLIC_RUUM_AMBIENTE: staging
      NEXT_PUBLIC_RUUM_SOPORTE_TELEFONO: "5500000000"
      NEXT_PUBLIC_RUUM_SOPORTE_CORREO: soporte-conductores-pruebas@example.test
      NEXT_PUBLIC_RUUM_EMERGENCIA_TELEFONO: "911"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify unified app version
        run: node scripts/verify-app-version.mjs

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test:unit

      - name: App conductor tests
        run: pnpm --filter @ruum/app-conductor test

      - name: Build
        run: pnpm build

  edge-functions:
    name: Edge Function checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Check Edge Functions
        run: deno task check:functions

  panel-admin-smoke:
    name: Panel admin smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm --filter @ruum/panel-admin exec playwright install --with-deps chromium

      - name: Run panel admin smoke
        run: pnpm --filter @ruum/panel-admin test:smoke

  app-conductor-a11y:
    name: App conductor accessibility
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.E2E_SUPABASE_SERVICE_ROLE_KEY }}
      PLAYWRIGHT_E2E_CONDUCTOR_EMAIL: ${{ secrets.E2E_CONDUCTOR_EMAIL }}
      PLAYWRIGHT_E2E_CONDUCTOR_PASSWORD: ${{ secrets.E2E_CONDUCTOR_PASSWORD }}
      NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN: pk.ci
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_ci
      NEXT_PUBLIC_APP_VERSION: ci
      NEXT_PUBLIC_RUUM_AMBIENTE: staging
      NEXT_PUBLIC_RUUM_SOPORTE_TELEFONO: "5500000000"
      NEXT_PUBLIC_RUUM_SOPORTE_CORREO: soporte-conductores-pruebas@example.test
      NEXT_PUBLIC_RUUM_EMERGENCIA_TELEFONO: "911"
      PLAYWRIGHT_DISABLE_AUTH_ARTIFACTS: "1"
      PLAYWRIGHT_A11Y_PROJECT: chromium

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --filter @ruum/app-conductor exec playwright install --with-deps chromium

      - name: Run accessibility tests
        run: pnpm --filter @ruum/app-conductor test:a11y

      - name: Build Storybook
        run: pnpm --filter @ruum/app-conductor storybook:build

      - name: Upload accessibility artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-conductor-accessibility
          retention-days: ${{ github.event_name == 'pull_request' && 14 || 90 }}
          if-no-files-found: warn
          path: |
            apps/app-conductor/playwright-report/
            apps/app-conductor/results/axe-results.json
            apps/app-conductor/artifacts/a11y/
            apps/app-conductor/test-results/
            apps/app-conductor/storybook-static/
            !apps/app-conductor/tests/.auth/
            !apps/app-conductor/test-results/**/tests/.auth/
            !apps/app-conductor/test-results/**/*.json
            !apps/app-conductor/test-results/**/*.zip

  app-conductor-lighthouse:
    name: App conductor Lighthouse
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN: pk.ci
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_ci
      NEXT_PUBLIC_APP_VERSION: ci
      NEXT_PUBLIC_RUUM_AMBIENTE: staging
      NEXT_PUBLIC_RUUM_SOPORTE_TELEFONO: "5500000000"
      NEXT_PUBLIC_RUUM_SOPORTE_CORREO: soporte-conductores-pruebas@example.test
      NEXT_PUBLIC_RUUM_EMERGENCIA_TELEFONO: "911"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Lighthouse Chromium
        run: pnpm --filter @ruum/app-conductor exec playwright install --with-deps chromium

      - name: Build production app
        run: pnpm --filter @ruum/app-conductor build

      - name: Run Lighthouse public routes
        run: pnpm --filter @ruum/app-conductor test:lighthouse

      - name: Upload Lighthouse artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-conductor-lighthouse
          retention-days: ${{ github.event_name == 'pull_request' && 14 || 90 }}
          if-no-files-found: error
          path: |
            apps/app-conductor/.lighthouse-ci/*.html
            apps/app-conductor/.lighthouse-ci/*.json

  app-conductor-android-config:
    name: Android Firebase and Gradle config
    env:
      RUUM_REMOTE_URL: ${{ vars.RUUM_CONDUCTOR_REMOTE_URL_STAGING }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Inject Firebase configuration
        env:
          FIREBASE_GOOGLE_SERVICES_JSON_B64: ${{ secrets.FIREBASE_GOOGLE_SERVICES_JSON_B64 }}
        run: |
          test -n "$FIREBASE_GOOGLE_SERVICES_JSON_B64" || (echo "Missing FIREBASE_GOOGLE_SERVICES_JSON_B64" && exit 1)
          echo "$FIREBASE_GOOGLE_SERVICES_JSON_B64" | base64 --decode > apps/app-conductor/android/app/google-services.json
      - name: Validate Firebase package and project
        run: node scripts/validate-firebase-config.mjs
      - name: Validate Gradle project
        working-directory: apps/app-conductor/android
        run: ./gradlew tasks --no-daemon
