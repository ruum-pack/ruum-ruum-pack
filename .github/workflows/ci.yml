name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  workspace:
    name: Workspace checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://ci.supabase.test
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
      NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN: pk.ci
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_ci
      NEXT_PUBLIC_PANEL_ADMIN_DEMO: "true"
      NEXT_PUBLIC_APP_VERSION: ci
      NEXT_PUBLIC_RUUM_AMBIENTE: staging
      NEXT_PUBLIC_RUUM_SOPORTE_TELEFONO: "5500000000"
      NEXT_PUBLIC_RUUM_SOPORTE_CORREO: soporte-conductores-pruebas@example.test
      NEXT_PUBLIC_RUUM_EMERGENCIA_TELEFONO: "911"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test:unit

      - name: App conductor tests
        run: pnpm --filter @ruum/app-conductor test

      - name: Build
        run: pnpm build

  edge-functions:
    name: Edge Function checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Check Edge Functions
        run: deno task check:functions

  panel-admin-smoke:
    name: Panel admin smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm --filter @ruum/panel-admin exec playwright install --with-deps chromium

      - name: Run panel admin smoke
        run: pnpm --filter @ruum/panel-admin test:smoke
