[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3001", "http://localhost:3002"]
jwt_expiry = 3600
enable_refresh_token_rotation = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[storage]
enabled = true

[functions.crear-payment-intent]
verify_jwt = false

# Stripe llama a este endpoint directamente desde sus servidores — nunca
# manda un JWT de Supabase, manda su propia firma (Stripe-Signature), que
# la función ya valida internamente con stripe.webhooks.constructEventAsync.
# Sin esto, el gateway de Supabase rechaza la llamada antes de que la
# función corra (confirmado en producción: 401 "Missing authorization
# header" al llamar la función sin sesión, igual que rechazaría a Stripe).
[functions.stripe-webhook]
verify_jwt = false
