# Docker Compose configuration for Ruum monorepo
# This configuration runs all three Next.js applications in development mode
# 
# Usage:
#   Development: docker-compose up
#   With dev config: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  # App Conductor - Port 3001
  app-conductor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ruum-app-conductor
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_APP_URL=http://localhost:3001
    volumes:
      - ./apps/app-conductor:/app/apps/app-conductor
      - ./packages:/app/packages
      - ./turbo.json:/app/turbo.json
      - ./pnpm-workspace.yaml:/app/pnpm-workspace.yaml
      - ./deno.json:/app/deno.json
      - ./deno.lock:/app/deno.lock
      - ./tsconfig.json:/app/tsconfig.json
    working_dir: /app
    command: pnpm --filter @ruum/app-conductor run dev
    stdin_open: true
    tty: true
    restart: unless-stopped

  # App Usuario - Port 3000
  app-usuario:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ruum-app-usuario
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
    volumes:
      - ./apps/app-usuario:/app/apps/app-usuario
      - ./packages:/app/packages
      - ./turbo.json:/app/turbo.json
      - ./pnpm-workspace.yaml:/app/pnpm-workspace.yaml
      - ./deno.json:/app/deno.json
      - ./deno.lock:/app/deno.lock
      - ./tsconfig.json:/app/tsconfig.json
    working_dir: /app
    command: pnpm --filter @ruum/app-usuario run dev
    stdin_open: true
    tty: true
    restart: unless-stopped

  # Panel Admin - Port 3002
  panel-admin:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ruum-panel-admin
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_APP_URL=http://localhost:3002
    volumes:
      - ./apps/panel-admin:/app/apps/panel-admin
      - ./packages:/app/packages
      - ./turbo.json:/app/turbo.json
      - ./pnpm-workspace.yaml:/app/pnpm-workspace.yaml
      - ./deno.json:/app/deno.json
      - ./deno.lock:/app/deno.lock
      - ./tsconfig.json:/app/tsconfig.json
    working_dir: /app
    command: pnpm --filter @ruum/panel-admin run dev
    stdin_open: true
    tty: true
    restart: unless-stopped

